<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Aysa Happy birthday!</title>
    <link rel="stylesheet" href="styles.css">

    <link rel="apple-touch-icon" sizes="180x180" href="/images/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/images/favicon-16x16.png">
    <link rel="mask-icon" href="/images/safari-pinned-tab.svg" color="#000005">
    <link rel="shortcut icon" href="/favicon.ico">
    <meta name="msapplication-TileColor" content="#000005">
    <meta name="msapplication-config" content="/images/browserconfig.xml">
    <meta name="theme-color" content="#000005">
</head>
<body>
<div id="birthday-text"></div>
<div class="stickers">
    <div class="sticker bottom right scaleX"><img src="images/2.gif" alt="" style="margin: 0 0 -16px 0;"></div>
    <div class="sticker bottom left scaleX"><img src="images/3.gif" alt="" style="margin: 0 0 -20px 0;"></div>
    <div class="sticker bottom left scaleX"><img src="images/4.gif" alt="" style="margin: 0 0 -20px -10px;"></div>
    <div class="sticker bottom right scaleX"><img src="images/5.gif" alt="" style="margin-bottom: -40px;"></div>
    <div class="sticker bottom right"><img src="images/6.gif" alt="" style="margin-bottom: -20px;margin-right: -16px;"></div>
    <div class="sticker bottom right scaleX"><img src="images/7.gif" alt="" style="margin-bottom: -40px;"></div>
    <div class="sticker bottom left"><img src="images/8.gif" alt="" style="margin-bottom: -40px;margin-left: -40px;"></div>
    <div class="sticker bottom right"><img src="images/cat.png" alt="" style="width: 150px;height: 150px;margin-bottom: -40px;margin-right: -40px;"></div>
</div>
<script type="text/javascript" src="script.js"></script>
</body>
</html>
